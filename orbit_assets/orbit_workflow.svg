<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
<title id="title">WHAM orbit simulation workflow</title><desc id="desc">Workflow from magnetic field data through a Boris integrator to orbit classification and velocity-space results.</desc>
<defs><linearGradient id="b" x1="0" x2="1"><stop stop-color="#141d36"/><stop offset="1" stop-color="#090d19"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity=".25"/></filter></defs>
<rect width="1280" height="520" rx="30" fill="#070a12"/>
<text x="640" y="62" text-anchor="middle" fill="#f6f8ff" font-family="Arial" font-size="34" font-weight="700">Simulation pipeline</text>
<g font-family="Arial" filter="url(#s)">
  <g transform="translate(55 128)"><rect width="245" height="250" rx="24" fill="url(#b)" stroke="#6786da" stroke-opacity=".55"/><text x="122" y="56" text-anchor="middle" fill="#dfe7ff" font-size="24" font-weight="700">WHAM field</text><text x="122" y="98" text-anchor="middle" fill="#aebbd9" font-size="18">COMSOL B<tspan baseline-shift="sub">r</tspan>(r,z), B<tspan baseline-shift="sub">z</tspan>(r,z)</text><path d="M38 178 C95 125 150 230 207 168" fill="none" stroke="#94aeff" stroke-width="5"/><path d="M38 202 C95 149 150 254 207 192" fill="none" stroke="#94aeff" stroke-width="3" opacity=".5"/></g>
  <g transform="translate(365 128)"><rect width="245" height="250" rx="24" fill="url(#b)" stroke="#6786da" stroke-opacity=".55"/><text x="122" y="56" text-anchor="middle" fill="#dfe7ff" font-size="24" font-weight="700">Field evaluator</text><text x="122" y="98" text-anchor="middle" fill="#aebbd9" font-size="18">Interpolate axisymmetric data</text><text x="122" y="130" text-anchor="middle" fill="#aebbd9" font-size="18">Convert to Cartesian B</text><circle cx="122" cy="190" r="47" fill="none" stroke="#94aeff" stroke-width="4"/><path d="M122 143 L122 237 M75 190 L169 190" stroke="#94aeff" stroke-width="3" opacity=".55"/></g>
  <g transform="translate(675 128)"><rect width="245" height="250" rx="24" fill="url(#b)" stroke="#6786da" stroke-opacity=".55"/><text x="122" y="56" text-anchor="middle" fill="#dfe7ff" font-size="24" font-weight="700">Boris pusher</text><text x="122" y="98" text-anchor="middle" fill="#aebbd9" font-size="18">Advance full Lorentz-force orbit</text><text x="122" y="130" text-anchor="middle" fill="#aebbd9" font-size="18">Track energy and position</text><path d="M45 207 C70 155 94 237 122 190 S175 143 202 198" fill="none" stroke="#c1d0ff" stroke-width="5"/></g>
  <g transform="translate(985 128)"><rect width="245" height="250" rx="24" fill="url(#b)" stroke="#6786da" stroke-opacity=".55"/><text x="122" y="56" text-anchor="middle" fill="#dfe7ff" font-size="24" font-weight="700">Classification</text><text x="122" y="98" text-anchor="middle" fill="#aebbd9" font-size="18">Confined / axial / radial</text><text x="122" y="130" text-anchor="middle" fill="#aebbd9" font-size="18">Aggregate velocity-space maps</text><rect x="52" y="165" width="42" height="42" fill="#7797f3"/><rect x="101" y="165" width="42" height="42" fill="#adc1ff"/><rect x="150" y="165" width="42" height="42" fill="#45598f"/><rect x="52" y="214" width="42" height="20" fill="#adc1ff"/><rect x="101" y="214" width="42" height="20" fill="#45598f"/><rect x="150" y="214" width="42" height="20" fill="#7797f3"/></g>
</g>
<g stroke="#91aaff" stroke-width="5" fill="none" stroke-linecap="round"><path d="M312 253 H350"/><path d="M337 240 L350 253 L337 266"/><path d="M622 253 H660"/><path d="M647 240 L660 253 L647 266"/><path d="M932 253 H970"/><path d="M957 240 L970 253 L957 266"/></g>
<text x="640" y="454" text-anchor="middle" fill="#9dabca" font-family="Arial" font-size="20">A reusable collisionless baseline for testing confinement across position, energy, pitch angle, and gyro phase</text>
